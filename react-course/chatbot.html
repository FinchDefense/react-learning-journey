<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      // This is a component! All components must use PascalCase(each word starts with a capital letter)
      function ChatInput(props) {
        function saveInputText(event) {
          console.log(event.target.value);
        }


        // If there is nothing between tags, we can just add a / so for ex. <input />
        return (
          // These empty tags are called fragments; function as divs but won't add divs to the DOM
          <>
            <input
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
            />
            <button>Send</button>
          </>
        );
      }

      // Doing { message, sender } instead of props is called destructuring
      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;

        /*
        if (sender === "robot") {
          return (
            <div>
              <img src="robot.png" width="50" />
              {message}
            </div>
          );
        }
        */

        return (
          <div>
            {sender === "robot" && (
              <img
                src="robot.png"
                width="50"
              />
            )}
            {message}
            {sender === "user" && (
              <img
                src="user.png"
                width="50"
              />
            )}
          </div>
        );
      }

      function ChatMessages() {
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "hello chatbot",
            sender: "user",
            id: "id1",
          },
          {
            message: "Hello! How can I help you?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "can you get me todays date?",
            sender: "user",
            id: "id3",
          },
          {
            message: "Today is September 27",
            sender: "robot",
            id: "id4",
          },
        ]);
        // This is array destructuring again:
        // Sets chatMessages to array[0] and setChatMessages to array[1], order matters!

        /*
        const [chatMessages, setChatMessages] = array;
        const chatMessages = array[0];
        const setChatMessages = array[1];
        */

        function sendMessage() {
          setChatMessages([
            ...chatMessages,
            {
              message: "test",
              sender: "user",
              id: crypto.randomUUID(),
            },
          ]);
        }

        return (
          <>
            <button onClick={sendMessage}>Send message</button>

            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        return (
          <>
            <ChatInput />
            <ChatMessages />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
