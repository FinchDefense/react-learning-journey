<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }

      .send-button {
        color: white;
        background-color: rgb(25, 125, 84);
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user {
        display: flex;
        justify-content: flex-end;
        align-items: start;
      }

      .chat-message-robot {
        display: flex;
        justify-content: flex-start;
        align-items: start;
      }

      .chat-message-text {
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }

      .chat-message-profile {
        width: 45px;
      }

      .chat-messages-container {
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      // This is a component! All components must use PascalCase(each word starts with a capital letter)
      function ChatInput({ chatMessages, setChatMessages }) {
        // When using state, always put the 'initial value' within the brackets
        // The first argument is always the "CURRENT DATA"
        // The second argument is always the "UPDATER FUNCTION", conventionally named 'set' + first_argument

        // HOOKS insert React features into our components
        // ALL hooks start with 'use' and then ______
        const [inputText, setInputText] = React.useState("");
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function handleKeyDown(event) {
          if (event.key === "Enter") sendMessage();
          if (event.key === "Escape") setInputText("");
        }

        // If there is nothing between tags, we can just add a / so for ex. <input />

        async function sendMessage() {
          if (isLoading || inputText === '') {
            return;
          }

          setIsLoading(true);
          const messageToSend = inputText;
          setInputText("");

          const newChatMessages = [
            ...chatMessages,
            {
              message: messageToSend,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];

          setChatMessages([
            ...newChatMessages,
            {
              message: 'Loading...',
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          const response = await Chatbot.getResponseAsync(messageToSend);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);

          setIsLoading(false)
        }

        return (
          // These empty tags are called fragments; function as divs but won't add divs to the DOM
          // Anything that starts with "on" is an event handler
          // onChange runs the function within its curly brackets every time something changes
          <div className="chat-input-container">
            <input
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={handleKeyDown}
              className="chat-input"
            />
            <button 
              onClick={sendMessage}
              className="send-button"
              >Send</button>
          </div>
        );
      }

      // Doing { message, sender } instead of props is called destructuring
      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;

        /*
        if (sender === "robot") {
          return (
            <div>
              <img src="robot.png" width="50" />
              {message}
            </div>
          );f
        }
        */

        return (
          <div className={
            sender === 'user' 
              ? 'chat-message-user' 
              : 'chat-message-robot'
          }>
            {sender === "robot" && (
              <img src="robot.png" 
              className="chat-message-profile"
                />
            )}
            <div className="chat-message-text">
              {message}
            </div>
            {sender === "user" && (
              <img src="user.png" 
              className="chat-message-profile"
                />
            )}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        // Hooks should always be at the top of the component and never inside anything, like in an if statement or within a function
        
        // React can automtically save an HTML element inside this ref or this container
        // null is the initial value within this container 
        const chatMessagesRef = React.useRef(null);

        // Runs everytime component is created or updated
        // The second argument, the array, is called a dependency array
        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div 
          className="chat-messages-container"
          ref={chatMessagesRef}>
            {chatMessages.map((chatMessages) => {
              return (
                <ChatMessage
                  message={chatMessages.message}
                  sender={chatMessages.sender}
                  key={chatMessages.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "hello chatbot",
            sender: "user",
            id: "id1",
          },
          {
            message: "Hello! How can I help you?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "can you get me todays date?",
            sender: "user",
            id: "id3",
          },
          {
            message: "Today is September 27",
            sender: "robot",
            id: "id4",
          },
        ]);
        // This is array destructuring again:
        // Sets chatMessages to array[0] and setChatMessages to array[1], order matters!

        /*
        const [chatMessages, setChatMessages] = array;
        const chatMessages = array[0];
        const setChatMessages = array[1];
        */

        return (
          <div className="app-container">
            <ChatMessages 
              chatMessages={chatMessages} 
            />
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
